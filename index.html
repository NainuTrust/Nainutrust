<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nainu Trust Dashboard</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .brand-name { font-size: 24px; font-weight: bold; color: #ff007f; }
        
        .asset-box { background: linear-gradient(135deg, #1a1a2e, #0f0f1a); margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .balance { font-size: 36px; font-weight: bold; margin: 10px 0; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
        .stat-card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .service-btn { background: #111; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #222; color: #fff; text-decoration: none; display: block; position: relative; }
        
        .coming-soon { color: #ff007f; font-size: 10px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-name">Nainu Trust</div>
        <div>☰</div>
    </div>

    <div class="asset-box">
        <div>TOTAL AVAILABLE ASSETS</div>
        <div class="balance">0.00 <span style="font-size: 16px;">PKR</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">Total Dep: <br><b>0.00</b></div>
        <div class="stat-card">Total With: <br><b>0.00</b></div>
        <div class="stat-card">Team: <br><b>0 Members</b></div>
        <div class="stat-card">Ref Profit: <br><b>0.00</b></div>
    </div>

    <div style="padding: 20px; font-weight: bold;">Essential Services</div>
    <div class="services-grid">
        <div class="service-btn" onclick="showSoon(this)">My Plans<span class="coming-soon"></span></div>
        <div class="service-btn" onclick="showSoon(this)">Team List<span class="coming-soon"></span></div>
        <div class="service-btn" onclick="showSoon(this)">Rewards<span class="coming-soon"></span></div>
        <div class="service-btn" onclick="showSoon(this)">Statement<span class="coming-soon"></span></div>
    </div>

    <script>
        function showSoon(element) {
            let span = element.querySelector('.coming-soon');
            span.innerText = "Coming Soon";
            setTimeout(() => { span.innerText = ""; }, 2000);
        }
    </script>

</body>
</html>
